<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ww1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ww2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
  </defs>
  
  <!-- Lobster with a wristwatch around one claw -->
  
  <!-- Body -->
  <ellipse cx="256" cy="300" rx="78" ry="95" fill="url(#ww1)"/>
  <path d="M182 270 Q256 288 330 270" stroke="#334155" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M180 303 Q256 320 332 303" stroke="#334155" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M186 336 Q256 352 326 336" stroke="#334155" stroke-width="3" fill="none" opacity="0.4"/>
  
  <!-- Tail -->
  <polygon points="256,395 236,368 276,368" fill="url(#ww1)"/>
  <polygon points="236,368 228,340 284,340 276,368" fill="#334155"/>
  
  <!-- Eyes -->
  <circle cx="226" cy="218" r="14" fill="#f8fafc"/>
  <circle cx="230" cy="216" r="7" fill="#0f172a"/>
  <circle cx="232" cy="213" r="3" fill="#f8fafc"/>
  <circle cx="286" cy="218" r="14" fill="#f8fafc"/>
  <circle cx="282" cy="216" r="7" fill="#0f172a"/>
  <circle cx="280" cy="213" r="3" fill="#f8fafc"/>
  
  <!-- Smile -->
  <path d="M242 260 Q256 275 270 260" stroke="#f8fafc" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Left claw (normal) -->
  <path d="M182 280 C140 248, 108 278, 120 322 C130 352, 158 340, 170 312 Z" fill="url(#ww1)"/>
  
  <!-- Right claw with wristwatch -->
  <path d="M330 280 C370 248, 402 278, 392 322 C382 352, 354 340, 342 312 Z" fill="url(#ww1)"/>
  
  <!-- Wristwatch on right claw -->
  <g transform="translate(390, 265)">
    <!-- Strap -->
    <rect x="-10" y="-22" width="20" height="50" rx="3" fill="#94a3b8"/>
    <!-- Watch case -->
    <rect x="-14" y="-10" width="28" height="26" rx="5" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <!-- Dial -->
    <rect x="-10" y="-6" width="20" height="18" rx="3" fill="#f8fafc"/>
    <line x1="0" y1="3" x2="0" y2="-2" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="3" x2="5" y2="6" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="2" fill="#0f172a"/>
    <!-- Crown -->
    <rect x="14" y="0" width="4" height="6" rx="1" fill="#d97706"/>
  </g>
  
  <!-- Antennae -->
  <path d="M234" y1="200" Q216 150 195 130" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="195" cy="130" r="5" fill="url(#ww2)"/>
  <path d="M278" y1="200" Q296 150 317 130" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="317" cy="130" r="5" fill="url(#ww2)"/>
  
  <text x="256" y="472" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="34" fill="#0f172a" letter-spacing="2">Clock Lobster</text>
</svg>