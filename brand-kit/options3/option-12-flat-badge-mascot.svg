<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fb1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  
  <circle cx="256" cy="240" r="205" fill="url(#fb1)"/>
  <circle cx="256" cy="240" r="192" fill="none" stroke="#f8fafc" stroke-width="2" opacity="0.15"/>
  
  <g transform="translate(0,-15)">
    <!-- Friendly body -->
    <ellipse cx="256" cy="265" rx="75" ry="90" fill="#e11d48"/>
    
    <!-- Segments -->
    <path d="M185 235 Q256 253 327 235" stroke="#be123c" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M182 268 Q256 286 330 268" stroke="#be123c" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M188 300 Q256 316 324 300" stroke="#be123c" stroke-width="3" fill="none" opacity="0.5"/>
    
    <!-- Clock face -->
    <circle cx="256" cy="260" r="42" fill="#f8fafc"/>
    <g fill="#0f172a">
      <rect x="253" y="222" width="6" height="5" rx="1"/>
      <rect x="253" y="293" width="6" height="5" rx="1"/>
      <rect x="218" y="257" width="5" height="6" rx="1"/>
      <rect x="289" y="257" width="5" height="6" rx="1"/>
    </g>
    <line x1="256" y1="260" x2="256" y2="232" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
    <line x1="256" y1="260" x2="276" y2="274" stroke="#e11d48" stroke-width="3" stroke-linecap="round"/>
    <circle cx="256" cy="260" r="5" fill="#0f172a"/>
    
    <!-- Eyes (above clock, on carapace) -->
    <circle cx="232" cy="200" r="10" fill="#f8fafc"/>
    <circle cx="235" cy="198" r="5" fill="#0f172a"/>
    <circle cx="237" cy="196" r="2" fill="#f8fafc"/>
    <circle cx="280" cy="200" r="10" fill="#f8fafc"/>
    <circle cx="277" cy="198" r="5" fill="#0f172a"/>
    <circle cx="275" cy="196" r="2" fill="#f8fafc"/>
    
    <!-- Gentle smile -->
    <path d="M244 345 Q256 356 268 345" stroke="#f8fafc" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Round friendly claws -->
    <ellipse cx="140" cy="230" rx="35" ry="28" fill="#e11d48" transform="rotate(-20 140 230)"/>
    <path d="M110 220 Q100 210 108 200" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="372" cy="230" rx="35" ry="28" fill="#e11d48" transform="rotate(20 372 230)"/>
    <path d="M402 220 Q412 210 404 200" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Antennae -->
    <path d="M238" y1="180" Q220 130 200 110" fill="none" stroke="#e11d48" stroke-width="4" stroke-linecap="round"/>
    <circle cx="200" cy="110" r="6" fill="#fbbf24"/>
    <path d="M274" y1="180" Q292 130 312 110" fill="none" stroke="#e11d48" stroke-width="4" stroke-linecap="round"/>
    <circle cx="312" cy="110" r="6" fill="#fbbf24"/>
    
    <!-- Tail -->
    <polygon points="256,360 238,335 274,335" fill="#e11d48"/>
    <polygon points="238,335 230,310 282,310 274,335" fill="#be123c"/>
  </g>
  
  <text x="256" y="470" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="32" fill="#1e293b" letter-spacing="2">Clock Lobster</text>
</svg>