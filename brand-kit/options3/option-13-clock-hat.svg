<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hc1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="hc2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
  </defs>
  
  <!-- Lobster character with a clock face on its head like a hat/bowler -->
  
  <!-- Body -->
  <ellipse cx="256" cy="320" rx="85" ry="100" fill="url(#hc2)"/>
  <path d="M175 290 Q256 310 337 290" stroke="#9f1239" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M172 325 Q256 345 340 325" stroke="#9f1239" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M180 358 Q256 376 332 358" stroke="#9f1239" stroke-width="3" fill="none" opacity="0.4"/>
  
  <!-- Tail -->
  <polygon points="256,420 234,390 278,390" fill="url(#hc2)"/>
  <polygon points="234,390 224,362 288,362 278,390" fill="#be123c"/>
  
  <!-- Clock hat on head -->
  <ellipse cx="256" cy="210" rx="65" ry="12" fill="#334155"/>
  <circle cx="256" cy="175" r="55" fill="url(#hc1)"/>
  <circle cx="256" cy="175" r="48" fill="none" stroke="#f8fafc" stroke-width="1" opacity="0.3"/>
  <g fill="#f8fafc">
    <rect x="252" y="124" width="8" height="6" rx="1"/>
    <rect x="252" y="220" width="8" height="6" rx="1"/>
    <rect x="205" y="171" width="6" height="8" rx="1"/>
    <rect x="301" y="171" width="6" height="8" rx="1"/>
  </g>
  <line x1="256" y1="175" x2="256" y2="135" stroke="#f8fafc" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="175" x2="282" y2="192" stroke="#e11d48" stroke-width="3" stroke-linecap="round"/>
  <circle cx="256" cy="175" r="5" fill="#fbbf24"/>
  
  <!-- Friendly eyes -->
  <circle cx="228" cy="240" r="14" fill="#f8fafc"/>
  <circle cx="232" cy="238" r="7" fill="#0f172a"/>
  <circle cx="234" cy="236" r="3" fill="#f8fafc"/>
  <circle cx="284" cy="240" r="14" fill="#f8fafc"/>
  <circle cx="280" cy="238" r="7" fill="#0f172a"/>
  <circle cx="278" cy="236" r="3" fill="#f8fafc"/>
  
  <!-- Warm smile -->
  <path d="M240 270 Q256 288 272 270" stroke="#f8fafc" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Claws -->
  <path d="M174 290 C130 255, 95 285, 110 330 C120 358, 155 348, 168 318 Z" fill="url(#hc2)"/>
  <path d="M338 290 C382 255, 417 285, 402 330 C392 358, 357 348, 344 318 Z" fill="url(#hc2)"/>
  
  <!-- Antennae -->
  <path d="M232" y1="220" Q210 175 190 155" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="190" cy="155" r="5" fill="#fbbf24"/>
  <path d="M280" y1="220" Q302 175 322 155" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="322" cy="155" r="5" fill="#fbbf24"/>
  
  <text x="256" y="478" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="34" fill="#0f172a" letter-spacing="2">Clock Lobster</text>
</svg>