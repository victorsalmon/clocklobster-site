<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Clock Face Lobster — Social Avatar (transparent, bolder strokes) -->

  <!-- Antennae -->
  <path d="M192,115 Q180,78 170,40" stroke="#e11d48" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M208,115 Q220,78 230,40" stroke="#e11d48" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <circle cx="170" cy="40" r="4" fill="#e11d48"/>
  <circle cx="230" cy="40" r="4" fill="#e11d48"/>

  <!-- Clock face -->
  <circle cx="200" cy="205" r="90" fill="none" stroke="#e11d48" stroke-width="5"/>

  <!-- Cardinal markers -->
  <g fill="#e11d48">
    <rect x="197" y="120" width="6" height="14" rx="2"/>
    <rect x="282" y="202" width="14" height="6" rx="2"/>
    <rect x="197" y="282" width="6" height="14" rx="2"/>
    <rect x="105" y="202" width="14" height="6" rx="2"/>
  </g>

  <!-- Dot markers -->
  <g fill="#e11d48">
    <circle cx="246" cy="129" r="3.5"/>
    <circle cx="278" cy="161" r="3.5"/>
    <circle cx="278" cy="249" r="3.5"/>
    <circle cx="246" cy="281" r="3.5"/>
    <circle cx="154" cy="281" r="3.5"/>
    <circle cx="122" cy="249" r="3.5"/>
    <circle cx="122" cy="161" r="3.5"/>
    <circle cx="154" cy="129" r="3.5"/>
  </g>

  <!-- Center hub -->
  <circle cx="200" cy="205" r="10" fill="#e11d48"/>
  <circle cx="200" cy="205" r="4.5" fill="#121214"/>

  <!-- Left claw -->
  <line x1="200" y1="205" x2="146" y2="173" stroke="#e11d48" stroke-width="11" stroke-linecap="round"/>
  <path d="M146,173 Q127,146 112,120" stroke="#e11d48" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M146,173 Q122,168 98,161" stroke="#e11d48" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Right claw -->
  <line x1="200" y1="205" x2="254" y2="173" stroke="#e11d48" stroke-width="11" stroke-linecap="round"/>
  <path d="M254,173 Q273,146 288,120" stroke="#e11d48" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M254,173 Q278,168 302,161" stroke="#e11d48" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Tail fan -->
  <path d="M185,293 L172,342 L189,320 L196,354 L200,360 L204,354 L211,320 L228,342 L215,293" fill="#e11d48"/>

  <!-- Legs -->
  <g stroke="#e11d48" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M113,190 Q92,198 75,216"/>
    <path d="M113,208 Q90,218 72,237"/>
    <path d="M113,226 Q94,238 78,257"/>
    <path d="M287,190 Q308,198 325,216"/>
    <path d="M287,208 Q310,218 328,237"/>
    <path d="M287,226 Q306,238 322,257"/>
  </g>
</svg>
