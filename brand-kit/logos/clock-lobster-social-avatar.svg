<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Clock Lobster — Social Avatar (transparent, bolder) -->

  <!-- Body -->
  <circle cx="200" cy="205" r="82" fill="#be123c"/>

  <!-- Clock markers -->
  <g fill="#f8fafc" opacity="0.9">
    <circle cx="200" cy="130" r="5"/>
    <circle cx="235" cy="140" r="4.5"/>
    <circle cx="260" cy="165" r="4.5"/>
    <circle cx="270" cy="200" r="5"/>
    <circle cx="260" cy="235" r="4.5"/>
    <circle cx="235" cy="260" r="4.5"/>
    <circle cx="200" cy="270" r="5"/>
    <circle cx="165" cy="260" r="4.5"/>
    <circle cx="140" cy="235" r="4.5"/>
    <circle cx="130" cy="200" r="5"/>
    <circle cx="140" cy="165" r="4.5"/>
    <circle cx="165" cy="140" r="4.5"/>
  </g>

  <!-- Eyes -->
  <circle cx="174" cy="168" r="15" fill="#f8fafc"/>
  <circle cx="174" cy="168" r="8" fill="#121214"/>
  <circle cx="177" cy="165" r="3.5" fill="#f8fafc"/>
  <circle cx="226" cy="168" r="15" fill="#f8fafc"/>
  <circle cx="226" cy="168" r="8" fill="#121214"/>
  <circle cx="229" cy="165" r="3.5" fill="#f8fafc"/>

  <!-- Left claw -->
  <line x1="200" y1="205" x2="156" y2="165" stroke="#e11d48" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="135" cy="146" rx="22" ry="33" transform="rotate(-35 135 146)" fill="#e11d48"/>
  <ellipse cx="146" cy="178" rx="14" ry="22" transform="rotate(-15 146 178)" fill="#e11d48"/>

  <!-- Right claw -->
  <line x1="200" y1="205" x2="244" y2="165" stroke="#e11d48" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="265" cy="146" rx="22" ry="33" transform="rotate(35 265 146)" fill="#e11d48"/>
  <ellipse cx="254" cy="178" rx="14" ry="22" transform="rotate(15 254 178)" fill="#e11d48"/>

  <!-- Center hub -->
  <circle cx="200" cy="205" r="15" fill="#e11d48"/>
  <circle cx="200" cy="205" r="8" fill="#121214"/>

  <!-- Tail -->
  <path d="M172,282 Q200,320 228,282 Q200,302 172,282" fill="#be123c"/>
  <path d="M183,280 L177,310 L193,288 L200,315 L207,288 L223,310 L217,280" fill="#be123c"/>

  <!-- Antennae -->
  <path d="M189,132 Q178,92 170,58" stroke="#e11d48" stroke-width="4" stroke-linecap="round" fill="none"/>
  <circle cx="170" cy="58" r="5.5" fill="#e11d48"/>
  <path d="M211,132 Q222,92 230,58" stroke="#e11d48" stroke-width="4" stroke-linecap="round" fill="none"/>
  <circle cx="230" cy="58" r="5.5" fill="#e11d48"/>

  <!-- Legs -->
  <g fill="#be123c">
    <circle cx="133" cy="188" r="8"/>
    <circle cx="127" cy="212" r="8"/>
    <circle cx="133" cy="236" r="8"/>
    <circle cx="267" cy="188" r="8"/>
    <circle cx="273" cy="212" r="8"/>
    <circle cx="267" cy="236" r="8"/>
  </g>
</svg>
