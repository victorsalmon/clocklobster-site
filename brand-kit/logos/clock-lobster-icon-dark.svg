<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Clock Face Lobster — Dark on Transparent -->

  <!-- Antennae -->
  <path d="M192,122 Q180,82 170,42" stroke="#121214" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M208,122 Q220,82 230,42" stroke="#121214" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="170" cy="42" r="3.5" fill="#121214"/>
  <circle cx="230" cy="42" r="3.5" fill="#121214"/>

  <!-- Clock face circle -->
  <circle cx="200" cy="210" r="85" fill="none" stroke="#121214" stroke-width="4.5"/>

  <!-- Hour markers — cardinal -->
  <g fill="#121214">
    <rect x="197" y="130" width="6" height="13" rx="1.5"/>
    <rect x="278" y="207" width="13" height="6" rx="1.5"/>
    <rect x="197" y="288" width="6" height="13" rx="1.5"/>
    <rect x="110" y="207" width="13" height="6" rx="1.5"/>
  </g>

  <!-- Hour markers — dots -->
  <g fill="#121214">
    <circle cx="243" cy="137" r="3"/>
    <circle cx="273" cy="167" r="3"/>
    <circle cx="273" cy="253" r="3"/>
    <circle cx="243" cy="283" r="3"/>
    <circle cx="157" cy="283" r="3"/>
    <circle cx="127" cy="253" r="3"/>
    <circle cx="127" cy="167" r="3"/>
    <circle cx="157" cy="137" r="3"/>
  </g>

  <!-- Center hub -->
  <circle cx="200" cy="210" r="9" fill="#121214"/>
  <circle cx="200" cy="210" r="4" fill="#ffffff"/>

  <!-- Left claw -->
  <line x1="200" y1="210" x2="148" y2="180" stroke="#121214" stroke-width="10" stroke-linecap="round"/>
  <path d="M148,180 Q130,153 115,128" stroke="#121214" stroke-width="6.5" stroke-linecap="round" fill="none"/>
  <path d="M148,180 Q125,175 102,168" stroke="#121214" stroke-width="8.5" stroke-linecap="round" fill="none"/>

  <!-- Right claw -->
  <line x1="200" y1="210" x2="252" y2="180" stroke="#121214" stroke-width="10" stroke-linecap="round"/>
  <path d="M252,180 Q270,153 285,128" stroke="#121214" stroke-width="6.5" stroke-linecap="round" fill="none"/>
  <path d="M252,180 Q275,175 298,168" stroke="#121214" stroke-width="8.5" stroke-linecap="round" fill="none"/>

  <!-- Tail fan -->
  <path d="M186,293 L173,340 L190,318 L196,350 L200,356 L204,350 L210,318 L227,340 L214,293" fill="#121214"/>

  <!-- Walking legs — left -->
  <g stroke="#121214" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M117,195 Q97,203 80,220"/>
    <path d="M117,212 Q94,222 76,240"/>
    <path d="M117,229 Q98,240 83,258"/>
  </g>

  <!-- Walking legs — right -->
  <g stroke="#121214" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M283,195 Q303,203 320,220"/>
    <path d="M283,212 Q306,222 324,240"/>
    <path d="M283,229 Q302,240 317,258"/>
  </g>
</svg>
