<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Clock Lobster — Favicon (simplified, transparent) -->

  <!-- Body -->
  <circle cx="32" cy="33" r="20" fill="#be123c"/>

  <!-- Eyes -->
  <circle cx="26" cy="26" r="4" fill="#f8fafc"/>
  <circle cx="26" cy="26" r="2" fill="#121214"/>
  <circle cx="38" cy="26" r="4" fill="#f8fafc"/>
  <circle cx="38" cy="26" r="2" fill="#121214"/>

  <!-- Left claw -->
  <line x1="32" y1="33" x2="21" y2="24" stroke="#e11d48" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="17" cy="21" rx="5" ry="8" transform="rotate(-35 17 21)" fill="#e11d48"/>

  <!-- Right claw -->
  <line x1="32" y1="33" x2="43" y2="24" stroke="#e11d48" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="47" cy="21" rx="5" ry="8" transform="rotate(35 47 21)" fill="#e11d48"/>

  <!-- Center -->
  <circle cx="32" cy="33" r="4" fill="#e11d48"/>
  <circle cx="32" cy="33" r="2" fill="#121214"/>

  <!-- Tail -->
  <path d="M26,50 Q32,58 38,50 Q32,54 26,50" fill="#be123c"/>

  <!-- Antennae -->
  <path d="M29,15 Q26,8 24,4" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="24" cy="4" r="2" fill="#e11d48"/>
  <path d="M35,15 Q38,8 40,4" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="40" cy="4" r="2" fill="#e11d48"/>
</svg>
