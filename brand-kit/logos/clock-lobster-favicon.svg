<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Clock Face Lobster — Favicon (simplified, transparent) -->

  <!-- Clock face -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#e11d48" stroke-width="3"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#e11d48"/>

  <!-- Left claw (10 o'clock) -->
  <line x1="32" y1="32" x2="20" y2="25" stroke="#e11d48" stroke-width="4" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="13" y2="17" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="11" y2="23" stroke="#e11d48" stroke-width="3" stroke-linecap="round"/>

  <!-- Right claw (2 o'clock) -->
  <line x1="32" y1="32" x2="44" y2="25" stroke="#e11d48" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="25" x2="51" y2="17" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="25" x2="53" y2="23" stroke="#e11d48" stroke-width="3" stroke-linecap="round"/>
</svg>
