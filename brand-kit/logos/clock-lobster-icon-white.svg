<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Clock Lobster — White on Transparent -->

  <!-- Body -->
  <circle cx="200" cy="210" r="78" fill="#f8fafc"/>

  <!-- Clock markers -->
  <g fill="#cbd5e1" opacity="0.8">
    <circle cx="200" cy="137" r="4.5"/>
    <circle cx="233" cy="146" r="4"/>
    <circle cx="257" cy="170" r="4"/>
    <circle cx="266" cy="203" r="4.5"/>
    <circle cx="257" cy="236" r="4"/>
    <circle cx="233" cy="260" r="4"/>
    <circle cx="200" cy="269" r="4.5"/>
    <circle cx="167" cy="260" r="4"/>
    <circle cx="143" cy="236" r="4"/>
    <circle cx="134" cy="203" r="4.5"/>
    <circle cx="143" cy="170" r="4"/>
    <circle cx="167" cy="146" r="4"/>
  </g>

  <!-- Eyes (dark pupils on white body) -->
  <circle cx="175" cy="175" r="10" fill="#121214"/>
  <circle cx="178" cy="172" r="3.5" fill="#f8fafc"/>
  <circle cx="225" cy="175" r="10" fill="#121214"/>
  <circle cx="228" cy="172" r="3.5" fill="#f8fafc"/>

  <!-- Left claw -->
  <line x1="200" y1="210" x2="160" y2="172" stroke="#f8fafc" stroke-width="18" stroke-linecap="round"/>
  <ellipse cx="140" cy="155" rx="20" ry="30" transform="rotate(-35 140 155)" fill="#f8fafc"/>
  <ellipse cx="150" cy="185" rx="13" ry="20" transform="rotate(-15 150 185)" fill="#f8fafc"/>

  <!-- Right claw -->
  <line x1="200" y1="210" x2="240" y2="172" stroke="#f8fafc" stroke-width="18" stroke-linecap="round"/>
  <ellipse cx="260" cy="155" rx="20" ry="30" transform="rotate(35 260 155)" fill="#f8fafc"/>
  <ellipse cx="250" cy="185" rx="13" ry="20" transform="rotate(15 250 185)" fill="#f8fafc"/>

  <!-- Center hub -->
  <circle cx="200" cy="210" r="14" fill="#f8fafc"/>
  <circle cx="200" cy="210" r="7" fill="#121214"/>

  <!-- Tail -->
  <path d="M175,280 Q200,315 225,280 Q200,298 175,280" fill="#f8fafc"/>
  <path d="M185,278 L180,305 L195,285 L200,310 L205,285 L220,305 L215,278" fill="#f8fafc"/>

  <!-- Antennae -->
  <path d="M190,140 Q180,100 172,68" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <circle cx="172" cy="68" r="5" fill="#f8fafc"/>
  <path d="M210,140 Q220,100 228,68" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <circle cx="228" cy="68" r="5" fill="#f8fafc"/>

  <!-- Legs -->
  <g fill="#f8fafc">
    <circle cx="138" cy="195" r="7"/>
    <circle cx="132" cy="218" r="7"/>
    <circle cx="138" cy="241" r="7"/>
    <circle cx="262" cy="195" r="7"/>
    <circle cx="268" cy="218" r="7"/>
    <circle cx="262" cy="241" r="7"/>
  </g>
</svg>
