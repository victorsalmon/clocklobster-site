  <path d="M256 55 L445 128 L445 260 C445 370 352 445 256 463 C160 445 67 370 67 260 L67 128 Z" fill="none" stroke="url(#pGold)" stroke-width="4"/>

  <!-- Lobster -->
  <!-- Tail -->
