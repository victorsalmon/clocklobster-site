  <path d="M195 230 C160 190, 120 220, 135 270 C145 295, 175 285, 190 260 Z" fill="url(#pBody)"/>
  <path d="M317 230 C352 190, 392 220, 377 270 C367 295, 337 285, 322 260 Z" fill="url(#pBody)"/>

